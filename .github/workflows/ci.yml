name: Self-Healing Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic python-dotenv openai

      - name: Run pytest
        run: pytest tests/test_dag.py -v

      - name: Smoke test agent schemas
        run: |
          python -c "
          from agent.schemas import RecoveryDecision, FailureType, RecoveryTool
          print('Agent schemas import OK')
          "